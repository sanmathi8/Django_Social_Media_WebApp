{% extends 'base.html' %}
{% block title %}Create Post • Socialize{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="form-page-card">
        <div class="form-page-header">Create new post</div>
        <div class="form-page-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group-custom">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                    <div style="color:var(--danger);font-size:12px;margin-top:4px">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}

                <div class="form-actions">
                    <a href="{% url 'home' %}" class="btn-secondary-custom" style="flex:1;text-align:center">Discard</a>
                    <button type="submit" class="btn-primary-custom" style="flex:1">Share</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
